{% extends 'layouts/base.html' %}

{% block title %}Login - MotoFix{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center py-5">
    <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">
        <div class="card shadow border-0 rounded-4 bg-white">
            <div class="card-body p-4 p-md-5">
                
                <div class="text-center mb-4">
                    <div class="bg-light d-inline-block p-3 rounded-circle mb-3 border border-light-subtle shadow-sm">
                        <i class="fas fa-motorcycle fa-2x text-dark"></i>
                    </div>
                    <h2 class="fw-bold text-dark tracking-tight">Welcome Back</h2>
                    <p class="text-muted small">Sign in to manage your appointments, parts, and shop operations</p>
                </div>

                <form action="{{ url_for('auth.login_post') }}" method="POST" class="needs-validation" novalidate>
                    <div class="mb-3">
                        <label for="email" class="form-label text-dark small fw-semibold">Email Address</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0 text-muted"><i class="fas fa-envelope"></i></span>
                            <input type="email" class="form-control border-start-0 ps-1" id="email" name="email" placeholder="name@example.com" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <label for="password" class="form-label text-dark small fw-semibold mb-0">Password</label>
                        </div>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0 text-muted"><i class="fas fa-lock"></i></span>
                            <input type="password" class="form-control border-start-0 ps-1" id="password" name="password" placeholder="******" required>
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <button class="btn btn-dark btn-lg rounded-3 fw-semibold fs-6 shadow-sm" type="submit">
                            Log In
                        </button>
                    </div>
                </form>

                <div class="text-center mt-4">
                    <p class="text-muted small mb-0">Don't have an account yet? 
                        <a href="{{ url_for('auth.register') }}" class="text-dark fw-bold text-decoration-underline">Create a Client Account</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Bootstrap 5 client-side validation
    (function () {
        'use strict'
        var forms = document.querySelectorAll('.needs-validation')
        Array.prototype.slice.call(forms).forEach(function (form) {
            form.addEventListener('submit', function (event) {
                if (!form.checkValidity()) {
                    event.preventDefault()
                    event.stopPropagation()
                }
                form.classList.add('was-validated')
            }, false)
        })
    })()
</script>
{% endblock %}
